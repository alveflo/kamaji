name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          bin="target/${{ matrix.target }}/release/kamaji"
          asset="kamaji-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "$(dirname "$bin")" kamaji
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/kamaji.exe"
          $asset = "kamaji-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $asset -Force
          $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "$asset.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # Glob both archive flavours; non-matching patterns are skipped
          # (fail_on_unmatched_files defaults to false), so each runner uploads
          # only the asset it actually produced.
          files: |
            kamaji-${{ matrix.target }}.tar.gz
            kamaji-${{ matrix.target }}.tar.gz.sha256
            kamaji-${{ matrix.target }}.zip
            kamaji-${{ matrix.target }}.zip.sha256
